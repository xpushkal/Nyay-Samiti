services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nyay-samiti-web
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: 'file:./dev.db'
      ML_SERVICE_URL: 'http://ml-service:8000'
      NODE_ENV: development
    depends_on:
      - ml-service
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"
    networks:
      - app-network

  ml-service:
    build:
      context: ./services/legal-ml
      dockerfile: Dockerfile
    container_name: nyay-samiti-ml
    ports:
      - '8000:8000'
    environment:
      BACKEND_URL: 'http://app:3000/api'
    volumes:
      - ./services/legal-ml/checkpoints:/app/checkpoints:ro
    restart: unless-stopped
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: nyay-samiti-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '9090:9090'
    depends_on:
      - app
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: nyay-samiti-grafana
    ports:
      - '3001:3000'
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app-network

volumes:
  grafana-data:

networks:
  app-network:
    driver: bridge
